<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AutoCal</title>
    <meta name="description" content="Contact AutoCal - Get in touch with questions, bug reports, or feature requests.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #374151; background-color: #ffffff; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
        .header { text-align: center; margin-bottom: 3rem; }
        .logo { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .logo-img { width: 30px; height: auto; border-radius: 6px; }
        .logo-text { font-size: 24px; font-weight: bold; color: #111827; }
        h1 { font-size: 2.5rem; font-weight: 700; color: #111827; margin-bottom: 1rem; }
        .subtitle { font-size: 1.125rem; color: #6b7280; }
        .content { background: #f9fafb; padding: 2rem; border-radius: 12px; border: 1px solid #e5e7eb; text-align: center; }
        .back-link { display: inline-flex; align-items: center; color: #059669; text-decoration: none; margin-bottom: 2rem; font-weight: 500; }
        .back-link:hover { color: #047857; }
        .content p { margin-bottom: 1rem; }
        .content a { color: #059669; }
        .email-box { background: #ffffff; padding: 1.5rem; border-radius: 8px; border: 1px solid #e5e7eb; margin-top: 1.5rem; }
        .email { font-size: 1.25rem; font-weight: 600; color: #111827; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to AutoCal</a>
        
        <div class="header">
            <div class="logo">
                <img class="logo-img" src="/AutoCalWebsite/images/icon128.png" alt="AutoCal">
                <span class="logo-text">AutoCal</span>
            </div>
            <h1>Get in Touch</h1>
            <p class="subtitle">Have a question, bug report, or feature request?</p>
        </div>

        <div class="content">
            <p>We'd love to hear from you! Whether you have a question about AutoCal, found a bug, or want to request a new feature, feel free to reach out.</p>
            
            <div class="email-box">
                <p>Email us at:</p>
                <p class="email">manilshangle@gmail.com</p>
            </div>
        </div>
    </div>
</body>
</html>

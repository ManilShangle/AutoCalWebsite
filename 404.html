<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AutoCal</title>
  <script>
    // Redirect to index.html with the current path in the hash
    var path = window.location.pathname;
    // Remove the leading /AutoCalWebsite/ to get the route
    var route = path.replace('/AutoCalWebsite/', '/');
    if (route === path) {
      // If it doesn't contain /AutoCalWebsite/, assume it's a direct access
      route = '/';
    }
    // Redirect to index.html with the route in the hash
    window.location.href = '/AutoCalWebsite/#' + route + window.location.search;
  </script>
</head>
<body>
</body>
</html>

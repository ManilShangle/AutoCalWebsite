<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AutoCal</title>
  <script>
    // Redirect to index.html with the current path
    var path = window.location.pathname;
    // Remove the leading /AutoCalWebsite/ to get the route
    var route = path.replace('/AutoCalWebsite/', '/');
    if (route === path) {
      // If it doesn't contain /AutoCalWebsite/, assume it's a direct access
      route = '/';
    }
    // Redirect to index.html with the route as a query param
    window.location.href = '/AutoCalWebsite/?redirect=' + encodeURIComponent(route) + window.location.search + window.location.hash;
  </script>
</head>
<body>
</body>
</html>

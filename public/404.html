<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AutoCal</title>
    <script type="text/javascript">
      // HashRouter redirect for GitHub Pages
      // This fixes direct navigation and page reload issues for SPA routing
      
      var pathSegmentsToKeep = 1;
      var l = window.location;
      
      // Get the full pathname
      var pathname = l.pathname;
      
      // Handle the case where we're at the root or a subdirectory
      // e.g., /AutoCalWebsite/privacy -> /#/privacy
      if (pathname.indexOf('/AutoCalWebsite') === 0) {
        // Remove /AutoCalWebsite prefix
        var path = pathname.slice('/AutoCalWebsite'.length);
        
        // If path is empty or just a slash, go to home
        if (!path || path === '/') {
          path = '/';
        } else {
          // Remove leading slash from path
          path = path.replace(/^\//, '');
        }
        
        // Build new URL with hash routing
        var newUrl = l.protocol + '//' + l.hostname + '/AutoCalWebsite/#/' + path;
        l.replace(newUrl);
      } else if (pathname !== '/' && pathname !== '') {
        // If somehow we got a path without AutoCalWebsite prefix, still try to redirect
        var simplePath = pathname.replace(/^\//, '');
        l.replace(l.protocol + '//' + l.hostname + '/AutoCalWebsite/#/' + simplePath);
      }
    </script>
  </head>
  <body>
  </body>
</html>
